server:
  port: ${API_PORT:8081}

spring:
  application:
    name: japan-news-api
  datasource:
    url: jdbc:postgresql://${NEWS_DB_HOST:localhost}:${NEWS_DB_PORT:5432}/${NEWS_DB_NAME:japan_news}
    username: ${NEWS_DB_USER:postgres}
    password: ${NEWS_DB_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

logging:
  charset:
    console: UTF-8
  level:
    com.japannews: INFO
