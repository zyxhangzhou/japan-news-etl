version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: japan-news-airflow:2.8.0-dev
  env_file:
    - .env
  environment:
    AIRFLOW_HOME: /opt/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    PYTHONPATH: /opt/airflow
    NEWS_DB_HOST: postgres
    NEWS_DB_PORT: 5432
    NEWS_DB_NAME: ${NEWS_DB_NAME}
    NEWS_DB_USER: ${NEWS_DB_USER}
    NEWS_DB_PASSWORD: ${NEWS_DB_PASSWORD}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_DB: ${REDIS_DB}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
    NEWS_ETL_FETCH_LIMIT: ${NEWS_ETL_FETCH_LIMIT}
    NEWS_ETL_SOURCE_LANG: ${NEWS_ETL_SOURCE_LANG}
    NEWS_ETL_TIMEZONE: ${NEWS_ETL_TIMEZONE}
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./etl:/opt/airflow/etl
    - ./sql:/opt/airflow/sql
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: japan-news-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${NEWS_DB_NAME}
      POSTGRES_USER: ${NEWS_DB_USER}
      POSTGRES_PASSWORD: ${NEWS_DB_PASSWORD}
    ports:
      - "${NEWS_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEWS_DB_USER} -d ${NEWS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: japan-news-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: japan-news-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME}" \
          --firstname "${AIRFLOW_ADMIN_FIRSTNAME}" \
          --lastname "${AIRFLOW_ADMIN_LASTNAME}" \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: japan-news-airflow-webserver
    command: airflow webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: japan-news-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-cli:
    <<: *airflow-common
    container_name: japan-news-airflow-cli
    profiles:
      - tools
    entrypoint: /bin/bash
    command:
      - -c
      - airflow info
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
